name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps for wgpu/winit
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps for wgpu/winit + lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            mesa-vulkan-drivers \
            pkg-config
      - name: cargo test --workspace --all-targets
        run: cargo test --workspace --all-targets
      # CPU/GPU parity probes in rye-shader/db.rs are #[ignore]d
      # locally because they need a wgpu adapter. lavapipe (from
      # mesa-vulkan-drivers above) provides one in CI. Filter by
      # name so the rye-camera perf bench (the other #[ignore]d
      # test) does not run here. CONVENTIONS section 4 / 5 calls
      # CPU/GPU parity load-bearing for the engineering thesis;
      # this is the gate.
      - name: cargo test gpu_probe -- --include-ignored
        env:
          WGPU_BACKEND: vulkan
        run: cargo test --workspace gpu_probe -- --include-ignored

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps for wgpu/winit
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            pkg-config
      # `--no-deps` keeps the run fast and limits failures to our own
      # docs. `RUSTDOCFLAGS=-D warnings` makes broken intra-doc links
      # and missing-code-block-language warnings fail the build;
      # docstring drift is otherwise invisible until a reader hits it.
      - name: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace
